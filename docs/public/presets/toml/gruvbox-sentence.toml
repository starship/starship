"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$conda\
$pixi\
$time\
$line_break\
$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "fg:color_orange bold"
format = '[$symbol ]($style)'

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
AOSC = "пҢҒ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = "пҶ—"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = "пҢӘ"

[username]
show_always = true
style_user = "fg:color_orange bold"
style_root = "fg:color_red bold"
format = '[$user ]($style)'

[directory]
style = "fg:color_yellow bold"
format = '[in ](fg:color_fg0)[$path ]($style)'
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "

[git_branch]
symbol = "пҗҳ"
style = "fg:color_aqua"
format = '[on ](fg:color_fg0)[$symbol $branch ]($style)'

[git_status]
style = "fg:color_red"
format = '[($all_status$ahead_behind )]($style)'

[nodejs]
symbol = "оңҳ"
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol $version ]($style)'

[c]
symbol = "оҳһ "
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol$version ]($style)'

[cpp]
symbol = "оҳқ "
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol$version ]($style)'

[rust]
symbol = "оһЁ"
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol $version ]($style)'

[golang]
symbol = "оҳ§"
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol $version ]($style)'

[php]
symbol = "оҳҲ"
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol $version ]($style)'

[java]
symbol = "оү–"
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol $version ]($style)'

[kotlin]
symbol = "оҳҙ"
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol $version ]($style)'

[haskell]
symbol = "оҳҹ"
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol $version ]($style)'

[python]
symbol = "оҳҶ"
style = "fg:color_blue"
format = '[via ](fg:color_fg0)[$symbol $version ]($style)'

[docker_context]
symbol = "пҢҲ"
style = "fg:color_purple"
format = '[via ](fg:color_fg0)[$symbol $context ]($style)'

[conda]
style = "fg:color_purple"
format = '[via ](fg:color_fg0)[$symbol $environment ]($style)'

[pixi]
style = "fg:color_purple"
format = '[via ](fg:color_fg0)[$symbol$version( $environment) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:color_fg0"
format = '[at ](fg:color_fg0)[ пҗә $time ]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[пҗІ](bold fg:color_green)'
error_symbol = '[пҗІ](bold fg:color_red)'
vimcmd_symbol = '[пҗҙ](bold fg:color_green)'
vimcmd_replace_one_symbol = '[пҗҙ](bold fg:color_purple)'
vimcmd_replace_symbol = '[пҗҙ](bold fg:color_purple)'
vimcmd_visual_symbol = '[пҗҙ](bold fg:color_yellow)'
