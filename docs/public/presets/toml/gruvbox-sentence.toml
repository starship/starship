format = '[$user ]($style)'

[directory]
style = "fg:color_yellow bold"
format = 'in [$path ]($style)'
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "fg:color_aqua"
format = 'on [$symbol $branch ]($style)'

[git_status]
style = "fg:color_red"
format = '[($all_status$ahead_behind )]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "fg:color_blue"
format = 'via [$symbol $version ]($style)'

[c]
symbol = "Ņś× "
style = "fg:color_blue"
format = 'via [$symbol$version ]($style)'

[cpp]
symbol = "ŅśØ "
style = "fg:color_blue"
format = 'via [$symbol$version ]($style)'

[rust]
symbol = "Ņ×©"
style = "fg:color_blue"
format = 'via [$symbol $version ]($style)'

[golang]
symbol = "Ņś¦"
style = "fg:color_blue"
format = 'via [$symbol $version ]($style)'

[php]
symbol = "Ņśł"
style = "fg:color_blue"
format = 'via [$symbol $version ]($style)'

[java]
symbol = "Ņē¢"
style = "fg:color_blue"
format = 'via [$symbol $version ]($style)'

[kotlin]
symbol = "Ņś┤"
style = "fg:color_blue"
format = 'via [$symbol $version ]($style)'

[haskell]
symbol = "Ņś¤"
style = "fg:color_blue"
format = 'via [$symbol $version ]($style)'

[python]
